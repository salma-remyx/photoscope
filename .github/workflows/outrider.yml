name: Outrider

# Daily cron that uses remyxai/outrider to pick a paper from
# engine.remyx.ai for this research interest and open a draft PR with a
# Claude-Code-scaffolded integration.
#
# Secrets needed (set in Settings → Secrets and variables → Actions):
#   REMYX_API_KEY     — engine.remyx.ai token
#   ANTHROPIC_API_KEY — Anthropic model token (default provider)
#   ZAI_API_KEY       — z.ai (GLM) token, used when a run is dispatched with provider=zai
#
# PR / Issue authorship: a remyx-ai[bot] token is minted below so artifacts
# are authored by the Remyx GitHub App (not github-actions[bot]).

on:
  schedule:
    # Daily at 14:00 UTC
    - cron: '0 14 * * *'
  workflow_dispatch:
    inputs:
      provider:
        description: 'Which model provider to route Claude Code at. anthropic = default api.anthropic.com; zai = z.ai (GLM family).'
        type: choice
        required: false
        default: 'anthropic'
        options:
          - anthropic
          - zai
      model:
        description: 'Specific model name to request from the provider (e.g. claude-opus-4-7, glm-5.2, glm-4.6). Empty = let the provider pick its default.'
        required: false
        default: ''
      pin-method:
        description: 'Optional arxiv_id or method query to implement directly (bypasses selection).'
        required: false
        default: ''
      pin-arxiv:
        description: 'Optional arxiv_id from this repo''s candidate pool to implement directly.'
        required: false
        default: ''
      claude-timeout:
        description: 'Wall-clock seconds for the Claude Code agent calls (preflight + implementation). Raise for very large monorepos; lower to cap cost.'
        required: false
        default: '900'

jobs:
  recommend:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
      pull-requests: write
      issues: write
    env:
      REMYX_API_KEY: ${{ secrets.REMYX_API_KEY }}
      # ANTHROPIC_API_KEY / ANTHROPIC_AUTH_TOKEN / ANTHROPIC_MODEL are
      # written to $GITHUB_ENV by the "Configure provider auth" step below
      # (auth env vars are mutually exclusive — non-Anthropic providers
      # require Bearer auth via AUTH_TOKEN and reject the x-api-key path).
    steps:
      # Mint a remyx-ai[bot] token from Remyx so the PR / Issue is authored by
      # the Remyx GitHub App (not github-actions[bot]). The App private key
      # stays on Remyx's side; this uses the REMYX_API_KEY already in secrets.
      # If it can't be minted (e.g. App not installed), the token is empty and
      # the action falls back to the workflow's built-in GITHUB_TOKEN.
      - name: Mint Remyx bot token
        id: remyx-bot
        shell: bash
        run: |
          token="$(curl -sf -X POST \
            -H "Authorization: Bearer ${{ secrets.REMYX_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d "{\"repo\": \"${{ github.repository }}\"}" \
            "https://engine.remyx.ai/api/v1.0/github/installation-token" \
            | python3 -c "import sys, json; print(json.load(sys.stdin).get('token', ''))")" || token=""
          echo "::add-mask::$token"
          echo "token=$token" >> "$GITHUB_OUTPUT"
      # Per-dispatch provider + model routing. Default cron runs hit
      # Anthropic (inputs.provider empty/anthropic); dispatch with
      # provider=zai to route one run at z.ai's endpoint.
      - name: Configure provider auth
        shell: bash
        env:
          ANTHROPIC_API_KEY_SECRET: ${{ secrets.ANTHROPIC_API_KEY }}
          ZAI_API_KEY_SECRET: ${{ secrets.ZAI_API_KEY }}
          MODEL_INPUT: ${{ inputs.model }}
        run: |
          if [ "${{ inputs.provider }}" = "zai" ]; then
            echo "ANTHROPIC_AUTH_TOKEN=$ZAI_API_KEY_SECRET" >> "$GITHUB_ENV"
          else
            echo "ANTHROPIC_API_KEY=$ANTHROPIC_API_KEY_SECRET" >> "$GITHUB_ENV"
          fi
          if [ -n "$MODEL_INPUT" ]; then
            echo "ANTHROPIC_MODEL=$MODEL_INPUT" >> "$GITHUB_ENV"
          fi
      - uses: remyxai/outrider@v1
        with:
          interest-id: 24ed00e8-846e-44d4-9154-8ab7cec19cac
          # remyx-ai[bot] token (empty → action falls back to GITHUB_TOKEN).
          github-token: ${{ steps.remyx-bot.outputs.token }}
          # Disable the per-repo rate-limit window so manual and scheduled
          # runs always evaluate the latest recommendation.
          rate-limit-days: '0'
          # Forwarded from the workflow_dispatch inputs so `remyxai outrider
          # trigger` can pin a paper, extend the timeout, or route at an
          # alternate provider per dispatch. Empty on scheduled runs.
          pin-method: ${{ inputs.pin-method }}
          pin-arxiv: ${{ inputs.pin-arxiv }}
          claude-timeout: ${{ inputs.claude-timeout }}
          # Maps provider name → base URL; empty on the default Anthropic path.
          model-base-url: ${{ inputs.provider == 'zai' && 'https://api.z.ai/api/anthropic' || '' }}
